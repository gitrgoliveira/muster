version: "2"

run:
  timeout: 3m
  go: "1.26"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (*net.TCPListener).Close
        - (net.Listener).Close
        - (*os.File).Close
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*os.Process).Kill
        - github.com/coder/websocket.(*Conn).CloseNow
        - github.com/coder/websocket.(*Conn).Close

formatters:
  enable:
    - gofmt
